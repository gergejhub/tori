<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF6B6B">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🏰 Töri Kvíz – 5. osztály</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== ROOT VARIABLES ===== */
:root {
  --coral:    #FF6B6B;
  --gold:     #FFD93D;
  --mint:     #51CF66;
  --sky:      #339AF0;
  --purple:   #CC5DE8;
  --orange:   #FF9F43;
  --pink:     #F783AC;
  --teal:     #38D9A9;
  --dark:     #212529;
  --light:    #F8F9FA;
  --white:    #FFFFFF;
  --shadow:   0 6px 24px rgba(0,0,0,.15);
  --radius:   22px;
  --radiusSm: 14px;
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size: 16px; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #FFF5E6 0%, #FFF0FB 50%, #EEF6FF 100%);
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--dark);
}

/* ===== APP WRAPPER ===== */
#app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* ===== SCREEN BASE ===== */
.screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 0 0 32px;
  animation: fadeIn .35s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }
@keyframes pop    { 0% { transform:scale(1); } 50% { transform:scale(1.18); } 100% { transform:scale(1); } }
@keyframes shake  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes spin   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes pulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.8;transform:scale(.97)} }
@keyframes confettiDrop { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
@keyframes starPop { 0%{transform:scale(0) rotate(-30deg);opacity:0} 60%{transform:scale(1.3) rotate(5deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1} }
@keyframes flipIn { from{transform:rotateY(90deg);opacity:0} to{transform:rotateY(0deg);opacity:1} }

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 20px 14px;
  position: relative;
}
.header-back {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--white);
  border: none;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(0,0,0,.12);
  display: flex; align-items:center; justify-content:center;
  transition: transform .15s;
}
.header-back:active { transform: scale(.92); }
.header-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.25rem;
  color: var(--dark);
  flex: 1;
}
.header-score {
  font-weight: 900;
  font-size: .95rem;
  background: var(--gold);
  color: var(--dark);
  padding: 5px 12px;
  border-radius: 50px;
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
}

/* ===== WELCOME SCREEN ===== */
.welcome-bg {
  background: linear-gradient(160deg, #FF6B6B 0%, #FF9F43 40%, #FFD93D 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  position: relative;
  overflow: hidden;
}
.welcome-castle {
  font-size: 6rem;
  animation: bounce 2.5s ease-in-out infinite;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,.25));
  margin-bottom: 8px;
}
.welcome-title {
  font-family: 'Fredoka One', cursive;
  font-size: 2.4rem;
  color: var(--white);
  text-align: center;
  text-shadow: 0 3px 12px rgba(0,0,0,.2);
  line-height: 1.15;
}
.welcome-sub {
  font-size: 1.05rem;
  color: rgba(255,255,255,.92);
  text-align: center;
  margin: 10px 0 28px;
  font-weight: 700;
}
.welcome-card {
  background: rgba(255,255,255,.97);
  border-radius: 28px;
  padding: 28px 24px;
  width: 100%;
  box-shadow: 0 12px 40px rgba(0,0,0,.18);
}
.input-label {
  font-size: .9rem;
  font-weight: 800;
  color: #555;
  margin-bottom: 8px;
  display: block;
}
.name-input {
  width: 100%;
  padding: 14px 18px;
  border: 3px solid #FFD93D;
  border-radius: 14px;
  font-size: 1.1rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  background: #FFFDE7;
  color: var(--dark);
  outline: none;
  transition: border-color .2s;
}
.name-input:focus { border-color: #FF6B6B; }
.btn-primary {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #FF6B6B 0%, #FF9F43 100%);
  color: white;
  font-family: 'Fredoka One', cursive;
  font-size: 1.25rem;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,107,107,.45);
  transition: transform .15s, box-shadow .15s;
  margin-top: 16px;
  letter-spacing: .5px;
}
.btn-primary:active { transform: scale(.96); box-shadow: 0 3px 12px rgba(255,107,107,.4); }

/* ===== HOME SCREEN ===== */
.home-hero {
  background: linear-gradient(135deg, #339AF0 0%, #CC5DE8 100%);
  padding: 28px 24px 40px;
  position: relative;
  overflow: hidden;
}
.home-hero::after {
  content: '';
  position: absolute;
  bottom: -20px; left: 0; right: 0;
  height: 44px;
  background: linear-gradient(135deg, #FFF5E6 0%, #FFF0FB 50%, #EEF6FF 100%);
  border-radius: 50% 50% 0 0 / 44px 44px 0 0;
}
.home-greeting {
  font-family: 'Fredoka One', cursive;
  font-size: 1.7rem;
  color: white;
  line-height: 1.2;
  margin-bottom: 4px;
}
.home-sub {
  color: rgba(255,255,255,.88);
  font-size: .95rem;
  font-weight: 700;
}
.home-stars-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  align-items: center;
}
.star-badge {
  background: rgba(255,255,255,.25);
  border-radius: 50px;
  padding: 6px 14px;
  color: white;
  font-weight: 800;
  font-size: .9rem;
  backdrop-filter: blur(8px);
}
.home-body { padding: 32px 20px 24px; }
.section-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.3rem;
  color: var(--dark);
  margin-bottom: 14px;
}
.topic-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  border: 3px solid transparent;
  transition: transform .15s, border-color .15s, box-shadow .15s;
  position: relative;
  overflow: hidden;
}
.topic-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 6px; height: 100%;
  border-radius: 4px 0 0 4px;
}
.topic-card.red::before  { background: linear-gradient(180deg, #FF6B6B, #FF9F43); }
.topic-card.blue::before { background: linear-gradient(180deg, #339AF0, #CC5DE8); }
.topic-card:active { transform: scale(.97); box-shadow: 0 3px 12px rgba(0,0,0,.12); }
.topic-emoji {
  font-size: 3rem;
  line-height: 1;
  flex-shrink: 0;
}
.topic-info { flex: 1; }
.topic-name {
  font-family: 'Fredoka One', cursive;
  font-size: 1.15rem;
  color: var(--dark);
  margin-bottom: 4px;
}
.topic-desc {
  font-size: .83rem;
  color: #777;
  font-weight: 600;
}
.topic-progress {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.progress-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #E9ECEF;
}
.progress-dot.done { background: var(--mint); }
.topic-arrow {
  font-size: 1.4rem;
  color: #CCC;
}

/* ===== TOPIC MENU ===== */
.topic-header {
  padding: 24px 20px;
  text-align: center;
  position: relative;
}
.topic-header-emoji { font-size: 4.5rem; animation: bounce 2s ease-in-out infinite; display: block; margin-bottom: 8px; }
.topic-header-name {
  font-family: 'Fredoka One', cursive;
  font-size: 1.8rem;
  color: var(--dark);
}
.topic-header-sub { font-size: .9rem; color: #888; font-weight: 700; margin-top: 4px; }
.mode-cards { padding: 0 20px; display: flex; flex-direction: column; gap: 14px; }
.mode-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  border-radius: var(--radius);
  cursor: pointer;
  border: none;
  text-align: left;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 16px rgba(0,0,0,.12);
  position: relative;
  overflow: hidden;
}
.mode-card:active { transform: scale(.97); }
.mode-card.study  { background: linear-gradient(135deg, #FFF3CD, #FFE082); }
.mode-card.quiz   { background: linear-gradient(135deg, #D3F9D8, #B2F2BB); }
.mode-card.tf     { background: linear-gradient(135deg, #E5DBFF, #D0BFFF); }
.mode-card.all    { background: linear-gradient(135deg, #FFE3E3, #FFC9C9); }
.mode-icon { font-size: 2.4rem; flex-shrink: 0; }
.mode-info { flex: 1; }
.mode-name {
  font-family: 'Fredoka One', cursive;
  font-size: 1.15rem;
  color: var(--dark);
}
.mode-desc { font-size: .82rem; color: #555; font-weight: 700; margin-top: 3px; }
.mode-badge {
  background: rgba(0,0,0,.1);
  padding: 4px 10px;
  border-radius: 50px;
  font-size: .78rem;
  font-weight: 800;
  color: #333;
}

/* ===== FLASHCARD SCREEN ===== */
.study-progress {
  padding: 12px 20px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-bar-wrap {
  flex: 1;
  height: 10px;
  background: #E9ECEF;
  border-radius: 50px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 50px;
  background: linear-gradient(90deg, #FF6B6B, #FFD93D);
  transition: width .4s ease;
}
.progress-text {
  font-size: .85rem;
  font-weight: 800;
  color: #888;
  white-space: nowrap;
}
.flashcard-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 20px;
}
.flashcard-hint {
  font-size: .82rem;
  color: #AAA;
  font-weight: 700;
  margin-bottom: 12px;
  text-align: center;
}
.flashcard {
  width: 100%;
  min-height: 220px;
  perspective: 1000px;
  cursor: pointer;
}
.flashcard-inner {
  position: relative;
  width: 100%;
  min-height: 220px;
  transition: transform .5s ease;
  transform-style: preserve-3d;
}
.flashcard-inner.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute;
  top: 0; left: 0; right: 0;
  min-height: 220px;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
  text-align: center;
}
.flashcard-front {
  background: linear-gradient(135deg, #4D96FF 0%, #339AF0 100%);
  color: white;
}
.flashcard-back {
  background: linear-gradient(135deg, #51CF66 0%, #38D9A9 100%);
  color: white;
  transform: rotateY(180deg);
}
.card-side-label {
  font-size: .72rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 2px;
  opacity: .7;
  margin-bottom: 12px;
}
.card-emoji { font-size: 2.5rem; margin-bottom: 12px; }
.card-text {
  font-size: 1.1rem;
  font-weight: 800;
  line-height: 1.4;
}
.flashcard-nav {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  width: 100%;
}
.btn-nav {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  cursor: pointer;
  transition: transform .15s;
  box-shadow: 0 3px 12px rgba(0,0,0,.12);
}
.btn-nav:active { transform: scale(.95); }
.btn-prev { background: #E9ECEF; color: #555; }
.btn-next { background: linear-gradient(135deg, #FF6B6B, #FF9F43); color: white; }
.btn-flip {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.05rem;
  cursor: pointer;
  background: linear-gradient(135deg, #CC5DE8, #9C27B0);
  color: white;
  box-shadow: 0 3px 12px rgba(0,0,0,.15);
  transition: transform .15s;
  margin-bottom: 10px;
}
.btn-flip:active { transform: scale(.95); }

/* ===== QUIZ SCREEN ===== */
.quiz-header { padding: 16px 20px 8px; }
.quiz-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.quiz-qnum {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  color: var(--dark);
}
.timer-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--white);
  padding: 6px 14px;
  border-radius: 50px;
  box-shadow: 0 2px 10px rgba(0,0,0,.1);
}
.timer-icon { font-size: 1.1rem; }
.timer-text {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  min-width: 28px;
  text-align: center;
}
.timer-text.urgent { color: #FF6B6B; animation: pulse .6s ease infinite; }
.timer-bar-wrap { width: 100%; height: 8px; background: #E9ECEF; border-radius: 50px; overflow: hidden; }
.timer-bar-fill {
  height: 100%;
  border-radius: 50px;
  background: linear-gradient(90deg, #51CF66, #FFD93D, #FF6B6B);
  transition: width 1s linear;
}
.quiz-body { padding: 16px 20px; }
.question-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 22px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.question-emoji { font-size: 2.2rem; display: block; margin-bottom: 10px; text-align: center; }
.question-text {
  font-size: 1.05rem;
  font-weight: 800;
  line-height: 1.45;
  text-align: center;
  color: var(--dark);
}
.options-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.option-btn {
  width: 100%;
  padding: 15px 18px;
  border: 3px solid #E9ECEF;
  border-radius: 14px;
  background: var(--white);
  font-family: 'Nunito', sans-serif;
  font-size: .97rem;
  font-weight: 700;
  color: var(--dark);
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: border-color .15s, background .15s, transform .1s;
  line-height: 1.35;
}
.option-btn:active { transform: scale(.98); }
.option-btn.correct {
  border-color: #51CF66;
  background: #D3F9D8;
  animation: pop .3s ease;
}
.option-btn.wrong {
  border-color: #FF6B6B;
  background: #FFE3E3;
  animation: shake .3s ease;
}
.option-btn.reveal {
  border-color: #51CF66;
  background: #D3F9D8;
}
.option-btn:disabled { cursor: default; }
.option-letter {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: #F1F3F5;
  display: flex; align-items:center; justify-content:center;
  font-weight: 900;
  font-size: .88rem;
  flex-shrink: 0;
}
.option-btn.correct .option-letter { background: #51CF66; color: white; }
.option-btn.wrong   .option-letter { background: #FF6B6B; color: white; }
.option-btn.reveal  .option-letter { background: #51CF66; color: white; }
.feedback-box {
  padding: 14px 18px;
  border-radius: 14px;
  font-weight: 800;
  font-size: .95rem;
  text-align: center;
  margin-bottom: 16px;
  display: none;
}
.feedback-box.show { display: block; animation: fadeIn .3s ease; }
.feedback-box.ok  { background: #D3F9D8; color: #2F9E44; border: 2px solid #8CE99A; }
.feedback-box.bad { background: #FFE3E3; color: #C92A2A; border: 2px solid #FFA8A8; }
.btn-next-q {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  cursor: pointer;
  background: linear-gradient(135deg, #339AF0 0%, #CC5DE8 100%);
  color: white;
  box-shadow: 0 4px 16px rgba(51,154,240,.35);
  transition: transform .15s;
  display: none;
}
.btn-next-q.show { display: block; animation: fadeIn .3s ease; }
.btn-next-q:active { transform: scale(.96); }

/* ===== TRUE/FALSE SCREEN ===== */
.tf-question-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 26px 24px;
  box-shadow: var(--shadow);
  margin: 20px 20px 16px;
  text-align: center;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}
.tf-emoji { font-size: 2.5rem; margin-bottom: 14px; }
.tf-text {
  font-size: 1.05rem;
  font-weight: 800;
  line-height: 1.5;
  color: var(--dark);
}
.tf-buttons {
  display: flex;
  gap: 14px;
  padding: 0 20px;
  margin-top: 4px;
}
.tf-btn {
  flex: 1;
  padding: 18px 10px;
  border: none;
  border-radius: 18px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.3rem;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 14px rgba(0,0,0,.15);
}
.tf-btn:active { transform: scale(.94); }
.tf-true  { background: linear-gradient(135deg, #51CF66, #38D9A9); color: white; }
.tf-false { background: linear-gradient(135deg, #FF6B6B, #FF9F43); color: white; }
.tf-btn-icon { font-size: 2rem; }
.tf-btn-label { font-size: .85rem; }
.tf-feedback {
  padding: 14px 20px;
  margin: 12px 20px 0;
  border-radius: 14px;
  font-weight: 800;
  text-align: center;
  display: none;
  animation: fadeIn .3s ease;
}
.tf-feedback.show { display: block; }
.tf-feedback.ok  { background: #D3F9D8; color: #2F9E44; }
.tf-feedback.bad { background: #FFE3E3; color: #C92A2A; }

/* ===== RESULT SCREEN ===== */
.result-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  position: relative;
  background: linear-gradient(135deg, #339AF0 0%, #CC5DE8 60%, #FF6B6B 100%);
  overflow: hidden;
}
.result-emoji {
  font-size: 5.5rem;
  animation: bounce 1.5s ease-in-out infinite;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,.25));
}
.result-title {
  font-family: 'Fredoka One', cursive;
  font-size: 2.3rem;
  color: white;
  text-align: center;
  margin: 12px 0 4px;
  text-shadow: 0 3px 10px rgba(0,0,0,.2);
}
.result-msg {
  color: rgba(255,255,255,.9);
  font-size: 1rem;
  text-align: center;
  font-weight: 700;
  margin-bottom: 20px;
  max-width: 300px;
}
.stars-display {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.star-display {
  font-size: 2.8rem;
  animation: starPop .4s ease both;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.3));
}
.star-display:nth-child(1) { animation-delay: .1s; }
.star-display:nth-child(2) { animation-delay: .3s; }
.star-display:nth-child(3) { animation-delay: .5s; }
.result-score-card {
  background: rgba(255,255,255,.22);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px 32px;
  text-align: center;
  margin-bottom: 24px;
  border: 2px solid rgba(255,255,255,.35);
}
.result-score-num {
  font-family: 'Fredoka One', cursive;
  font-size: 3rem;
  color: white;
  line-height: 1;
}
.result-score-sub {
  color: rgba(255,255,255,.8);
  font-size: .9rem;
  font-weight: 700;
}
.result-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }

/* =====================================================================
   SOUND (Web Audio API)
   ===================================================================== */
const AC = (typeof AudioContext !== 'undefined') ? new AudioContext() : null;
function beep(freq, dur, type='sine', vol=0.15) {
  if (!AC) return;
  try {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(); o.stop(AC.currentTime + dur);
  } catch(e) {}
}
const SFX = {
  correct: () => { beep(523,0.1); setTimeout(()=>beep(659,0.15),100); setTimeout(()=>beep(784,0.2),220); },
  wrong:   () => { beep(200,0.3,'sawtooth'); },
  click:   () => { beep(440,0.06); },
  win:     () => { [523,587,659,698,784,880,988].forEach((f,i)=>setTimeout(()=>beep(f,0.18),i*90)); }
};

/* =====================================================================
   HELPERS
   ===================================================================== */
function shuffle(arr) { return [...arr].sort(() => Math.random()-.5); }
function $(sel, ctx) { return (ctx||document).querySelector(sel); }
function $$(sel, ctx) { return [...(ctx||document).querySelectorAll(sel)]; }

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  S.timerRunning = false;
}

function startTimer(onEnd) {
  stopTimer();
  S.timerVal = 25;
  S.timerRunning = true;
  updateTimerUI();
  timerInterval = setInterval(() => {
    if (!S.timerRunning) return;
    S.timerVal--;
    updateTimerUI();
    if (S.timerVal <= 0) {
      stopTimer();
      onEnd();
    }
  }, 1000);
}

function updateTimerUI() {
  const el = $('.timer-text');
  const bar = $('.timer-bar-fill');
  if (el) {
    el.textContent = S.timerVal;
    el.className = 'timer-text' + (S.timerVal <= 7 ? ' urgent' : '');
  }
  if (bar) bar.style.width = (S.timerVal / 25 * 100) + '%';
}

function pct() { return S.total > 0 ? Math.round(S.score / S.total * 100) : 0; }
function stars() {
  const p = pct();
  if (p >= 80) return 3;
  if (p >= 55) return 2;
  if (p >= 30) return 1;
  return 0;
}
function resultMsg(p) {
  if (p >= 90) return ['🎉 FANTASZTIKUS! 🎉', 'Te vagy a középkor legokosabb lovagja! Ötös biztos!'];
  if (p >= 75) return ['🌟 Szuper! 🌟', 'Nagyon jól teljesítettél! Büszke vagyok rád!'];
  if (p >= 55) return ['😊 Jól ment! 😊', 'Szép teljesítmény! Még egy kis ismétlés és perfekt leszel!'];
  if (p >= 35) return ['🤔 Majdnem! 🤔', 'Ne add fel! Nézd át a kártyákat és próbáld újra!'];
  return ['💪 Nem gond! 💪', 'Minden próbálkozás közelebb visz a sikerhez! Tanulj és újra kísérletezz!'];
}

   ===================================================================== */
function makeConfetti(n=30) {
  const colors = ['#FF6B6B','#FFD93D','#51CF66','#339AF0','#CC5DE8','#FF9F43','#F783AC'];
  const container = $('.result-screen') || document.body;
  for (let i=0; i<n; i++) {
    const d = document.createElement('div');
    d.className = 'confetti-piece';
    d.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*30-20}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${8+Math.random()*10}px;
      height:${8+Math.random()*10}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${2+Math.random()*2}s;
      animation-delay:${Math.random()*1.5}s;
    `;
    container.appendChild(d);
    setTimeout(() => d.remove(), 5000);
  }
}

function render() {
  stopTimer();
  switch (S.screen) {
    case 'welcome':   APP.innerHTML = renderWelcome();   break;

    case 'topicMenu': APP.innerHTML = renderTopicMenu(); break;
    case 'study':     APP.innerHTML = renderStudy();     break;
    case 'quiz':      APP.innerHTML = renderQuiz();      initQuizTimer(); break;
    case 'tf':        APP.innerHTML = renderTF();        break;
    case 'result':    APP.innerHTML = renderResult();    setTimeout(()=>{ if(stars()>=2) makeConfetti(); SFX.win(); },400); break;
  }
}

      <div class="spacer-sm"></div>
      <div class="feedback-box" id="fbBox"></div>
      <button class="btn-next-q" id="btnNextQ" onclick="nextQuizQ()">
        ${S.idx===S.total-1 ? '🏁 Eredmény!' : 'Következő kérdés ›'}
      </button>
    </div>
  </div>`;
}
function initQuizTimer() {
  if (!S.answered) {
    startTimer(() => {
      if (!S.answered) answerQuiz(-1);
    });
  }
}
function answerQuiz(chosen) {
  if (S.answered) return;
  stopTimer();
  S.answered = true;
  const q = S._questions[S.idx];
  const correct = chosen === q.ans;
  if (correct) { S.score++; SFX.correct(); }
  else { SFX.wrong(); }

  // Highlight buttons
  $$('.option-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('reveal');
    if (i === chosen && !correct) btn.classList.add('wrong');
    if (i === chosen && correct) { btn.classList.remove('reveal'); btn.classList.add('correct'); }
  });

  // Feedback
  const fb = $('#fbBox');
  if (fb) {
    fb.className = 'feedback-box show ' + (correct ? 'ok' : 'bad');
    if (chosen === -1) fb.innerHTML = `⏰ Lejárt az idő! A helyes válasz: <strong>${q.opts[q.ans]}</strong><br><em>${q.exp}</em>`;
    else if (correct)  fb.innerHTML = `${['🎉 Helyes!','🌟 Brávó!','💯 Tökéletes!','🏆 Szuper!'][Math.floor(Math.random()*4)]} ${q.exp}`;
    else               fb.innerHTML = `😬 Nem ez volt... A helyes válasz: <strong>${q.opts[q.ans]}</strong><br><em>${q.exp}</em>`;
  }
  const btn = $('#btnNextQ');
  if (btn) btn.classList.add('show');
}
function nextQuizQ() {
  SFX.click();
  if (S.idx >= S.total - 1) {
    S.progress[S.topic].quiz = Math.max(S.progress[S.topic].quiz, S.score);
    S.screen = 'result'; render(); return;
  }
  S.idx++;
  S.answered = false;
  S.timerVal = 25;
  render();
}

/* =====================================================================
   SCREEN: TRUE / FALSE
   ===================================================================== */
function renderTF() {
  const q = S._questions[S.idx];
  return `
  <div class="screen">
    <div class="header">
      <button class="header-back" onclick="backToMenu()">‹</button>
      <span class="header-title">${DATA[S.topic].emoji} Igaz/Hamis</span>
      <span class="header-score">⭐ ${S.score}</span>
    </div>
    <div class="study-progress" style="padding:12px 20px 0">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${(S.idx+1)/S.total*100}%"></div></div>
      <span class="progress-text">${S.idx+1} / ${S.total}</span>
    </div>
    <div class="tf-question-card">
      <div class="tf-emoji">${q.emoji}</div>
      <div class="tf-text">"${q.s}"</div>
    </div>
    <div class="tf-buttons">
      <button class="tf-btn tf-true" id="btnTrue" onclick="answerTF(true)">
        <span class="tf-btn-icon">✅</span>
        <span class="tf-btn-label">IGAZ</span>
      </button>
      <button class="tf-btn tf-false" id="btnFalse" onclick="answerTF(false)">
        <span class="tf-btn-icon">❌</span>
        <span class="tf-btn-label">HAMIS</span>
      </button>
    </div>
    <div class="tf-feedback" id="tfFb"></div>
    <div style="padding:12px 20px 0">
      <button class="btn-next-q" id="btnNextTF" onclick="nextTF()">
        ${S.idx===S.total-1 ? '🏁 Eredmény!' : 'Következő ›'}
      </button>
    </div>
  </div>`;
}
function answerTF(answer) {
  if (S.answered) return;
  S.answered = true;
  const q = S._questions[S.idx];
  const correct = answer === q.t;
  if (correct) { S.score++; SFX.correct(); }
  else { SFX.wrong(); }

  $('#btnTrue').disabled = true;
  $('#btnFalse').disabled = true;

  const fb = $('#tfFb');
  if (fb) {
    fb.className = 'tf-feedback show ' + (correct ? 'ok' : 'bad');
    if (correct) fb.innerHTML = `✅ ${['Helyes! 🎉','Brávó! 🌟','Igen, pontosan! 💯','Szuper! 🏆'][Math.floor(Math.random()*4)]} ${q.exp}`;
    else         fb.innerHTML = `❌ Téves! A mondat valójában <strong>${q.t?'IGAZ':'HAMIS'}</strong>. ${q.exp}`;
  }
  const btn = $('#btnNextTF');
  if (btn) btn.classList.add('show');
}
function nextTF() {
  SFX.click();
  if (S.idx >= S.total - 1) {
    S.progress[S.topic].tf = Math.max(S.progress[S.topic].tf, S.score);
    S.screen = 'result'; render(); return;
  }
  S.idx++;
  S.answered = false;
  render();
}

/* =====================================================================
   SCREEN: RESULT
   ===================================================================== */
function renderResult() {
  const p = pct(), st = stars();
  const [title, msg] = resultMsg(p);
  const modeName = S.mode === 'quiz' ? 'Kvíz' : 'Igaz/Hamis';
  const starEmoji = ['😢','⭐','⭐⭐','⭐⭐⭐'];
  return `
  <div class="result-screen screen">
    <div class="result-emoji">${p>=80?'🏆':p>=55?'🌟':p>=35?'😊':'💪'}</div>
    <div class="result-title">${title}</div>
    <div class="result-msg">${msg}</div>
    <div class="stars-display">
      ${'⭐'.repeat(st)}${'☆'.repeat(3-st)}
    </div>
    <div class="result-score-card">
      <div class="result-score-num">${S.score} / ${S.total}</div>
      <div class="result-score-sub">${p}% helyes válasz — ${modeName}</div>
    </div>
    <div class="result-btns">
      <button class="btn-retry" onclick="retryMode()">🔄 Próbáld újra!</button>
      <button class="btn-home" onclick="goHome()">🏠 Főmenüre</button>
    </div>
  </div>`;
}
function retryMode() { SFX.click(); startMode(S.mode); }

/* =====================================================================
   KEY EVENTS (Enter to submit name)
   ===================================================================== */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && S.screen === 'welcome') startGame();
});

/* =====================================================================
   INIT
   ===================================================================== */
render();
</script>
</body>
</html>
